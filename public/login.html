<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdFix - Login</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #fff;
            margin: auto;
            padding: 20px;
            border-radius: 12px;
            max-width: 90%;
            width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 sm:p-8 flex items-center justify-center">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl p-6 sm:p-10">
        <!-- Login Section -->
        <div id="login-section" class="flex items-center justify-center min-h-screen">
            <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
                
                <header class="text-center mb-8">
                    
                    <h1 class="text-3xl sm:text-4xl font-bold text-gray-900">Log in to your account</h1>
                    <p class="mt-2 text-gray-500 text-sm">Use the provided credentials to log in.</p>
                </header>
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label for="admin-email" class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" id="admin-email" name="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border-2" required>
                    </div>
                    <div>
                        <label for="admin-password" class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" id="admin-password" name="password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border-2" required>
                    </div>
                    <p id="login-error" class="text-sm text-red-600 hidden text-center"></p>
                    <button type="submit" class="w-full bg-indigo-600 text-white rounded-lg py-2 px-4 font-semibold shadow-md hover:bg-indigo-700 transition-colors">
                        Log In
                    </button>
                </form>
                <p class="mt-4 text-center text-sm text-gray-500">
                    <a href="#" id="anonymous-login-link" class="text-indigo-600 hover:text-indigo-500">Log in anonymously</a> to view the user dashboard.
                </p>
            </div>
        </div>
    </div>
    <script type="module">
        import { getAuth, signInWithEmailAndPassword, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('login-error');
        const anonymousLoginLink = document.getElementById('anonymous-login-link');
        
        // Credentials hardcoded for demo purposes
        const ADMIN_EMAIL = "admin@gmail.com";
        const ADMIN_PASSWORD = "ADMIN";

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;

            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                // Redirect to the main app page
                window.location.href = 'index.html';
            } else {
                loginError.textContent = "Invalid email or password.";
                loginError.classList.remove('hidden');
            }
        });

        anonymousLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            // Redirect to the main app page as a non-admin user
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
